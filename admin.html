<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USS Admin Command Center (Local)</title>
    <link rel="stylesheet" href="styles.css?v=ADMIN_V2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --admin-bg: #0a1018;
            --admin-panel: #111b29;
            --admin-accent: #00ff00;
        }
        body { background: var(--admin-bg); color: #ccc; font-family: 'Courier New', monospace; }
        
        #login-screen {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a2a3a 0%, #000 100%);
        }

        .login-box {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--admin-accent);
            padding: 2rem;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 1rem;
            background: #222;
            border: 1px solid #444;
            color: white;
        }

        .admin-btn {
            width: 100%;
            padding: 10px;
            background: var(--admin-accent);
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Dashboard */
        #dashboard { display: none; height: 100vh; flex-direction: column; }
        
        .admin-nav {
            background: #000;
            border-bottom: 1px solid #333;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-layout {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        .admin-sidebar {
            width: 250px;
            background: var(--admin-panel);
            border-right: 1px solid #333;
            padding: 1rem;
        }

        .admin-menu-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #222;
            color: #aaa;
            margin-bottom: 5px;
        }
        .admin-menu-item:hover, .admin-menu-item.active {
            color: var(--admin-accent);
            background: rgba(0,255,0,0.05);
            border-left: 3px solid var(--admin-accent);
        }

        .admin-content {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        /* Content Editor */
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            height: 100%;
        }
        
        .item-list {
            background: #111;
            border: 1px solid #333;
            overflow-y: auto;
            max-height: 80vh;
        }
        
        .list-item {
            padding: 10px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .list-item:hover, .list-item.selected {
            background: #222;
            color: var(--admin-accent);
        }

        .editor-form {
            background: #111;
            padding: 2rem;
            border: 1px solid #333;
        }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--admin-accent); font-size: 0.8rem; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
        }
        .form-group textarea { height: 100px; resize: vertical; }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }

        /* File Manager */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }
        .file-card {
            background: #222;
            padding: 5px;
            text-align: center;
            font-size: 0.7rem;
            border: 1px solid #333;
        }
        .file-card img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            background: #000;
            margin-bottom: 5px;
        }

    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--admin-accent);">USS COMMAND</h2>
            <p style="font-size:0.8rem; margin-bottom:1rem; color:#888;">SECURE LOCAL GATEWAY</p>
            
            <form onsubmit="event.preventDefault(); login();">
                <input type="text" id="username" placeholder="Username" value="admin">
                <input type="password" id="password" placeholder="Password" value="uss2025">
                <button class="admin-btn">INITIALIZE</button>
            </form>
            <p id="login-msg" style="color:red; margin-top:10px; font-size:0.8rem;"></p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <nav class="admin-nav">
            <span style="font-weight:bold; color:var(--admin-accent);">USS INTELLIGENCE CORE</span>
            <div style="font-size:0.8rem; color:#666;">SERVER: <span style="color:#fff;">localhost:8000</span></div>
            <button onclick="logout()" style="background:none; border:1px solid #555; color:#aaa; padding:5px 10px; cursor:pointer;">TERMINATE</button>
        </nav>
        <div class="admin-layout">
            <aside class="admin-sidebar">
                <div class="admin-menu-item active" onclick="showSection('reviews')"><i class="fas fa-star"></i> Review Manager</div>
                <div class="admin-menu-item" onclick="showSection('partners')"><i class="fas fa-handshake"></i> Partner Manager</div>
                <div class="admin-menu-item" onclick="showSection('files')"><i class="fas fa-folder"></i> File Browser</div>
            </aside>
            <main class="admin-content">
                
                <!-- EDITOR SECTION (Shared for Reviews/Partners) -->
                <div id="editor-ui">
                    <div class="toolbar">
                        <h2 id="section-title" style="margin:0; flex-grow:1;">Manager</h2>
                        <button class="admin-btn" style="width:auto; background:var(--admin-accent); color:black;" onclick="newItem()">+ NEW</button>
                        <button class="admin-btn" style="width:auto; background:#444; color:white;" onclick="saveAll()">SAVE TO DISK</button>
                    </div>

                    <div class="editor-container">
                        <div class="item-list" id="item-list">
                            <!-- JS Populated -->
                        </div>
                        <div class="editor-form" id="editor-form" style="display:none;">
                            <input type="hidden" id="edit-index">
                            <div id="form-fields"></div>
                            <div style="margin-top:1rem; display:flex; gap:10px;">
                                <button class="admin-btn" onclick="updateCurrent()">UPDATE ITEM</button>
                                <button class="admin-btn" style="background:red; color:white;" onclick="deleteCurrent()">DELETE</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- FILE MANAGER SECTION -->
                <div id="files-ui" style="display:none;">
                    <h2>Asset Browser</h2>
                    <div class="toolbar">
                        <select id="folder-select" onchange="loadFiles(this.value)" style="padding:5px; background:#000; color:#fff; border:1px solid #333;">
                            <option value="portfolio">Portfolio</option>
                            <option value="partners">Partners</option>
                            <option value="reviews">Reviews</option>
                        </select>
                        <button class="admin-btn" style="width:auto;" onclick="document.getElementById('upload-input').click()">UPLOAD</button>
                        <input type="file" id="upload-input" hidden onchange="uploadFile(this)">
                    </div>
                    <div class="file-grid" id="file-grid"></div>
                </div>

            </main>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000/api/admin";
        let TOKEN = localStorage.getItem('uss_token');
        let CURRENT_DATA = [];
        let CURRENT_TYPE = 'reviews'; // 'reviews' or 'partners'

        // Init
        if(TOKEN) showDashboard();

        // --- AUTH ---
        async function login() {
            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const res = await fetch(`${API_URL}/login`, { method: 'POST', body: formData });
                if(res.ok) {
                    const data = await res.json();
                    TOKEN = data.access_token;
                    localStorage.setItem('uss_token', TOKEN);
                    showDashboard();
                } else {
                    document.getElementById('login-msg').innerText = "Access Denied.";
                }
            } catch(e) {
                console.error(e);
                document.getElementById('login-msg').innerText = "Server Unreachable.";
            }
        }

        function logout() {
            localStorage.removeItem('uss_token');
            location.reload();
        }

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            loadContent('reviews');
        }

        function showSection(section) {
            document.querySelectorAll('.admin-menu-item').forEach(i => i.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(section === 'files') {
                document.getElementById('editor-ui').style.display = 'none';
                document.getElementById('files-ui').style.display = 'block';
                loadFiles('portfolio');
            } else {
                document.getElementById('files-ui').style.display = 'none';
                document.getElementById('editor-ui').style.display = 'block';
                loadContent(section);
            }
        }

        // --- CONTENT EDITOR ---

        async function loadContent(type) {
            CURRENT_TYPE = type;
            document.getElementById('section-title').innerText = type.toUpperCase() + " DATABASE";
            document.getElementById('editor-form').style.display = 'none';
            
            try {
                const res = await fetch(`${API_URL}/content/${type}`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                CURRENT_DATA = await res.json();
                renderList();
            } catch(e) {
                alert("Failed to load content.");
            }
        }

        function renderList() {
            const list = document.getElementById('item-list');
            list.innerHTML = '';
            
            CURRENT_DATA.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'list-item';
                // Display logic based on type
                const label = CURRENT_TYPE === 'reviews' ? `${item.author} (${item.company})` : item.name;
                div.innerHTML = `<span>${label}</span> <i class="fas fa-chevron-right" style="font-size:0.7rem;"></i>`;
                div.onclick = () => selectItem(idx);
                list.appendChild(div);
            });
        }

        function selectItem(idx) {
            const item = CURRENT_DATA[idx];
            document.getElementById('edit-index').value = idx;
            document.getElementById('editor-form').style.display = 'block';
            
            // Build Form
            const container = document.getElementById('form-fields');
            container.innerHTML = '';
            
            for(let key in item) {
                const grp = document.createElement('div');
                grp.className = 'form-group';
                
                const label = document.createElement('label');
                label.innerText = key.toUpperCase();
                
                let input;
                if(key === 'text' || key === 'review') {
                    input = document.createElement('textarea');
                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                }
                input.id = `field-${key}`;
                input.value = item[key];
                
                grp.appendChild(label);
                grp.appendChild(input);
                container.appendChild(grp);
            }
            
            // Highlight list item
            document.querySelectorAll('.list-item').forEach(i => i.classList.remove('selected'));
            document.querySelectorAll('.list-item')[idx].classList.add('selected');
        }

        function newItem() {
            // Create empty template based on first item
            const template = { ...CURRENT_DATA[0] };
            for(let key in template) template[key] = "";
            CURRENT_DATA.unshift(template);
            renderList();
            selectItem(0);
        }

        function updateCurrent() {
            const idx = document.getElementById('edit-index').value;
            const item = CURRENT_DATA[idx];
            
            for(let key in item) {
                const val = document.getElementById(`field-${key}`).value;
                item[key] = val;
            }
            renderList();
            alert("Item updated in memory. Click SAVE TO DISK to commit.");
        }

        function deleteCurrent() {
            if(!confirm("Delete this item?")) return;
            const idx = document.getElementById('edit-index').value;
            CURRENT_DATA.splice(idx, 1);
            renderList();
            document.getElementById('editor-form').style.display = 'none';
        }

        async function saveAll() {
            try {
                const res = await fetch(`${API_URL}/content/${CURRENT_TYPE}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(CURRENT_DATA)
                });
                if(res.ok) alert("Database Saved Successfully!");
                else alert("Save Failed.");
            } catch(e) {
                alert("Error saving: " + e);
            }
        }

        // --- FILES ---

        async function loadFiles(folder) {
            const grid = document.getElementById('file-grid');
            grid.innerHTML = '<p>Loading...</p>';
            
            try {
                const res = await fetch(`${API_URL}/files?path=${folder}`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await res.json();
                
                grid.innerHTML = '';
                data.files.forEach(f => {
                    const div = document.createElement('div');
                    div.className = 'file-card';
                    div.innerHTML = `
                        <img src="assets/images/${folder}/${f}">
                        <div>${f}</div>
                    `;
                    div.onclick = () => {
                        // Copy path to clipboard
                        navigator.clipboard.writeText(`assets/images/${folder}/${f}`);
                        alert("Path copied: " + `assets/images/${folder}/${f}`);
                    };
                    grid.appendChild(div);
                });
            } catch(e) {
                grid.innerHTML = '<p>Error loading files.</p>';
            }
        }

        async function uploadFile(input) {
            const file = input.files[0];
            const folder = document.getElementById('folder-select').value;
            if(!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('folder', folder);
            
            try {
                const res = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${TOKEN}` },
                    body: formData
                });
                if(res.ok) {
                    alert("Upload Success!");
                    loadFiles(folder);
                } else alert("Upload Failed.");
            } catch(e) {
                alert("Error: " + e);
            }
        }

    </script>
</body>
</html>
