[build]
  publish = "."
  command = ""

[functions]
  included_files = ["products.js"]

[[redirects]]
  from = "/api/submit-lead"
  to = "/.netlify/functions/submit-lead"
  status = 200

# --- Security headers for all pages ---
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-hashes' cdnjs.cloudflare.com js.stripe.com; style-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; img-src 'self' data: https://securityhardwarestore.com https://ltsecurityinc.com https://ltssecurity.com https://lts.com; font-src 'self' cdnjs.cloudflare.com fonts.gstatic.com; connect-src 'self' *.netlify.app https://api.stripe.com; frame-src 'self' js.stripe.com https://play.google.com; child-src 'self' js.stripe.com https://play.google.com"

# --- Long-lived cache for static assets ---
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Short cache for product catalog data ---
[[headers]]
  for = "/products.js"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# --- No-cache for HTML pages ---
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
