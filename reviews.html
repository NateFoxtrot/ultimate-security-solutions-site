<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reviews | Ultimate Security Solutions</title>
    <link rel="stylesheet" href="styles.css?v=FIX_V3_INLINE">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .reviews-container {
            max-width: 1200px;
            margin: 4rem auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .review-card {
            background: rgba(15, 28, 46, 0.6);
            border: 1px solid rgba(255, 215, 0, 0.1);
            padding: 2rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .review-card:hover {
            border-color: var(--color-accent);
            transform: translateY(-5px);
            background: rgba(15, 28, 46, 0.8);
        }

        .review-header {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }

        .stars {
            color: var(--color-accent);
            font-size: 0.9rem;
            margin-right: 2px;
        }

        .review-card p {
            font-style: italic;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: var(--color-text);
        }

        .review-card strong {
            color: var(--color-accent);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    
    <!-- Navigation -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="service_area.html">Service Area</a>
                <div class="dropdown">
                    <span class="dropdown-trigger">Hardware <i class="fas fa-chevron-down" style="font-size: 0.7rem; margin-left: 5px;"></i></span>
                    <div class="dropdown-content">
                        <a href="ordering_system.html">All Products</a>
                        <a href="ordering_system.html?cat=platinum">Platinum Series</a>
                        <a href="ordering_system.html?cat=pro">Pro Series</a>
                        <a href="ordering_system.html?cat=nvr">NVR Systems</a>
                        <a href="ordering_system.html?cat=camera">IP Cameras</a>
                    </div>
                </div>
                <a href="accomplishments.html">Our Work</a>
                <a href="partners.html">Partners</a>
                <a href="reviews.html" class="active">Reviews</a>
                <a href="#contact" class="btn-contact">Contact Us</a>
            </div>
        </div>
    </nav>

    <header class="page-header">
        <h1>Client Success Stories</h1>
        <p>See what our partners and clients are saying about our deployments.</p>
    </header>

    <div class="reviews-container" id="reviews-container">
        <!-- Reviews Injected JS -->
    </div>

    <footer>
        <p>&copy; 2025 Ultimate Security Solutions LLC. All Rights Reserved.</p>
    </footer>

    <script src="assets/js/reviews_data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('reviews-container');
            
            function getStars(rating) {
                let stars = '';
                for (let i = 0; i < 5; i++) {
                    if (i < rating) stars += '<i class="fas fa-star stars"></i>';
                    else stars += '<i class="far fa-star stars"></i>';
                }
                return stars;
            }

            reviewsData.forEach(review => {
                const card = document.createElement('div');
                card.className = 'review-card';
                card.innerHTML = `
                    <div class="review-header">
                        <div style="display: flex; flex-direction: column; flex: 1;">
                            <div style="margin-bottom: 5px;">${getStars(review.rating)}</div>
                            <span style="color: var(--color-muted); font-size: 0.8rem;">${review.date}</span>
                        </div>
                        ${review.logo ? `<img src="${review.logo}" alt="${review.company}" style="height: 40px; max-width: 120px; object-fit: contain;" onerror="this.style.display='none'">` : ''}
                    </div>
                    <p>"${review.text}"</p>
                    <p><strong>- ${review.author}</strong>${review.company ? `<br><span style="font-size: 0.7rem; opacity: 0.7;">${review.company}</span>` : ''}</p>
                `;
                container.appendChild(card);
            });
        });
    </script>
    <script src="assets/js/ai-concierge.js"></script>
</body>
</html>
